name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Check Python syntax
        run: |
          python -m py_compile tests/*.py scripts/*.py
          echo "✅ All Python files have valid syntax"

  env-check:
    name: Environment Check (Dry Run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate env_check.py
        run: |
          python -m py_compile scripts/env_check.py
          echo "✅ env_check.py is valid"
      
      - name: Validate crash_recovery.py
        run: |
          python -m py_compile scripts/crash_recovery.py
          echo "✅ crash_recovery.py is valid"

  # macOS tests require self-hosted runner with GUI access
  # Uncomment when self-hosted runner is configured
  # 
  # macos-test:
  #   name: macOS Integration Tests
  #   runs-on: self-hosted
  #   needs: [lint]
  #   steps:
  #     - uses: actions/checkout@v4
  #     
  #     - name: Check environment
  #       run: ./scripts/check-env.sh
  #     
  #     - name: Run tests
  #       run: |
  #         for test in tests/test_*.py; do
  #           echo "Running $test..."
  #           python "$test" || echo "⚠️ $test failed"
  #         done
  #     
  #     - name: Generate report
  #       if: always()
  #       run: echo "Test run completed at $(date)"

  report:
    name: Generate Summary
    runs-on: ubuntu-latest
    needs: [lint, env-check]
    if: always()
    steps:
      - uses: actions/checkout@v4
      
      - name: Count test files
        run: |
          TEST_COUNT=$(ls tests/test_*.py 2>/dev/null | wc -l)
          echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Test files**: $TEST_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- **Lint status**: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Env check**: ${{ needs.env-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Files" >> $GITHUB_STEP_SUMMARY
          for f in tests/test_*.py; do
            echo "- \`$f\`" >> $GITHUB_STEP_SUMMARY
          done
